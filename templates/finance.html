<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinCore | Финансовый учёт</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0a0a2a 0%, #0f0f35 50%, #1a1a4a 100%);
            min-height: 100vh;
            position: relative;
        }
        
        /* Анимированный фон */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(102,126,234,0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(118,75,162,0.15) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        
        .container {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* Премиум хедер */
        .header {
            background: linear-gradient(135deg, rgba(102,126,234,0.2), rgba(118,75,162,0.2));
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 32px;
            padding: 40px;
            margin-bottom: 40px;
            position: relative;
            overflow: hidden;
        }
        
        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #a5b4fc, #c4b5fd);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
            position: relative;
            z-index: 1;
        }
        
        .header h1 i {
            background: none;
            -webkit-background-clip: unset;
            color: #667eea;
            margin-right: 12px;
        }
        
        .header p {
            color: rgba(255,255,255,0.7);
            font-size: 1.1rem;
            position: relative;
            z-index: 1;
        }
        
        /* Статистические карточки */
        .stat-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 24px;
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            border-color: rgba(102,126,234,0.5);
            box-shadow: 0 20px 40px -15px rgba(0,0,0,0.3);
        }
        
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #667eea, #764ba2, #667eea);
        }
        
        .stat-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, rgba(102,126,234,0.2), rgba(118,75,162,0.2));
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin: 0 auto 20px auto;
        }
        
        .stat-number {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #a5b4fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .text-muted {
            color: rgba(255,255,255,0.6) !important;
            font-size: 14px;
            margin-top: 8px;
        }
        
        /* Карточка с платежами */
        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 20px;
        }
        
        .card h3 {
            color: #fff;
            font-weight: 600;
            margin-bottom: 20px;
        }
        
        .card h3 i {
            margin-right: 10px;
            color: #667eea;
        }
        
        /* Таблица */
        .table {
            color: #e2e8f0;
            margin-bottom: 0;
        }
        
        .table thead th {
            border-bottom: 1px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.7);
            font-weight: 600;
            padding: 15px;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .table tbody td {
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding: 15px;
            vertical-align: middle;
        }
        
        .table tbody tr:hover {
            background: rgba(255,255,255,0.03);
        }
        
        .status-completed {
            background: rgba(16,185,129,0.2);
            color: #10b981;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }
        
        .status-pending {
            background: rgba(245,158,11,0.2);
            color: #f59e0b;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }
        
        .amount {
            font-weight: 700;
            color: #a5b4fc;
        }
        
        /* Анимация загрузки */
        .skeleton-text {
            background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            border-radius: 4px;
        }
        
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        /* Адаптивность */
        @media (max-width: 768px) {
            .header h1 { font-size: 1.8rem; }
            .stat-number { font-size: 24px; }
            .stat-card { padding: 16px; }
            .stat-icon { width: 45px; height: 45px; font-size: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-chart-line"></i> FinCore</h1>
            <p class="mb-0">Управление финансами и отчётами в реальном времени</p>
        </div>
        
        <div class="row mb-4">
            <div class="col-md-3 mb-3">
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-arrow-up"></i></div>
                    <div class="stat-number" id="totalIncome">0 ₽</div>
                    <div class="text-muted">Доход</div>
                </div>
            </div>
            <div class="col-md-3 mb-3">
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-arrow-down"></i></div>
                    <div class="stat-number" id="totalExpenses">0 ₽</div>
                    <div class="text-muted">Расходы</div>
                </div>
            </div>
            <div class="col-md-3 mb-3">
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-chart-simple"></i></div>
                    <div class="stat-number" id="totalProfit">0 ₽</div>
                    <div class="text-muted">Прибыль</div>
                </div>
            </div>
            <div class="col-md-3 mb-3">
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-credit-card"></i></div>
                    <div class="stat-number" id="totalPayments">0</div>
                    <div class="text-muted">Платежей</div>
                </div>
            </div>
        </div>
        
        <div class="card">
            <h3><i class="fas fa-clock"></i> Последние платежи</h3>
            <div class="table-responsive">
                <table class="table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Сумма</th>
                            <th>Статус</th>
                            <th>Дата</th>
                            <th>Тариф</th>
                        </tr>
                    </thead>
                    <tbody id="paymentsTable">
                        <tr>
                            <td colspan="5" class="text-center">
                                <div class="skeleton-text" style="width: 200px; margin: 0 auto; padding: 10px;">Загрузка...</div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
   <script>
// Загрузка статистики платежей
fetch('/api/admin/payment-stats')
    .then(function(r) { return r.json(); })
    .then(function(d) {
        var totalIncome = d.total_amount || 0;
        var paymentsCount = d.payments_count || 0;
        
        document.getElementById('totalIncome').innerHTML = totalIncome.toLocaleString() + ' ₽';
        document.getElementById('totalPayments').innerHTML = paymentsCount;
        document.getElementById('totalExpenses').innerHTML = '0 ₽';
        document.getElementById('totalProfit').innerHTML = totalIncome.toLocaleString() + ' ₽';
    })
    .catch(function(e) {
        console.error('Ошибка загрузки статистики:', e);
        document.getElementById('totalIncome').innerHTML = '0 ₽';
        document.getElementById('totalPayments').innerHTML = '0';
    });

// Загрузка последних платежей
function loadRecentPayments() {
    fetch('/api/admin/payments/recent?limit=10')
        .then(function(r) { return r.json(); })
        .then(function(data) {
            var tbody = document.getElementById('paymentsTable');
            if (data.payments && data.payments.length > 0) {
                var html = '';
                for (var i = 0; i < data.payments.length; i++) {
                    var p = data.payments[i];
                    var statusClass = (p.status === 'completed') ? 'status-completed' : 'status-pending';
                    var statusText = (p.status === 'completed') ? 'Оплачен' : 'Ожидание';
                    var date = p.created_at ? new Date(p.created_at).toLocaleDateString('ru-RU') : '—';
                    var amount = (p.amount || 0).toLocaleString();
                    var idShort = p.id ? p.id.slice(0, 8) : '—';
                    var planName = p.plan_name || '—';
                    
                    html = html + '<tr>' +
                        '<td><code>' + idShort + '</code></td>' +
                        '<td class="amount">' + amount + ' ₽</td>' +
                        '<td><span class="' + statusClass + '">' + statusText + '</span></td>' +
                        '<td>' + date + '</td>' +
                        '<td>' + planName + '</td>' +
                        '</tr>';
                }
                tbody.innerHTML = html;
            } else {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center">Нет платежей</td></tr>';
            }
        })
        .catch(function(e) {
            console.error('Ошибка загрузки платежей:', e);
            document.getElementById('paymentsTable').innerHTML = '<tr><td colspan="5" class="text-center">Ошибка загрузки данных</td></tr>';
        });
}

loadRecentPayments();
setInterval(loadRecentPayments, 30000);
</script>
</body>
</html>

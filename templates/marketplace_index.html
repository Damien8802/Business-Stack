<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Маркетплейс | BizStore</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #0f0f23 50%, #1a1a2e 100%);
            min-height: 100vh;
            color: #ffffff;
        }
        
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }
        
        .animated-bg::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 30%, rgba(102,126,234,0.15) 0%, transparent 60%);
            animation: float1 20s ease-in-out infinite;
        }
        
        .animated-bg::after {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 80% 70%, rgba(118,75,162,0.1) 0%, transparent 60%);
            animation: float2 25s ease-in-out infinite;
        }
        
        @keyframes float1 { 0%,100% { transform: translate(-25%,-25%) scale(1); } 50% { transform: translate(-25%,-25%) scale(1.2); } }
        @keyframes float2 { 0%,100% { transform: translate(-25%,-25%) scale(1.2); } 50% { transform: translate(-25%,-25%) scale(1); } }
        
        .container { position: relative; z-index: 1; max-width: 1400px; margin: 0 auto; padding: 40px 24px; }
        
        .page-header { margin-bottom: 40px; }
        .page-title { font-size: 36px; font-weight: 800; background: linear-gradient(135deg, #ffffff, #a78bfa, #667eea); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
        .page-subtitle { color: rgba(255,255,255,0.5); font-size: 16px; }
        
        /* Дополнительные стили для выбора модулей */
        .card-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .module-checkbox {
            width: 24px;
            height: 24px;
            cursor: pointer;
            accent-color: #10b981;
        }
        .card-header-checkbox {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 10px;
        }
        .download-bar {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #1a1a2e, #0f0f23);
            border: 1px solid rgba(16,185,129,0.3);
            border-radius: 60px;
            padding: 12px 24px;
            display: flex;
            gap: 20px;
            align-items: center;
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .download-bar .count {
            background: #10b981;
            padding: 4px 12px;
            border-radius: 30px;
            font-weight: bold;
        }
        .download-bar button {
            background: linear-gradient(135deg, #10b981, #059669);
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        .download-bar button:active { transform: scale(0.98); }
        
        .filters { display: flex; gap: 12px; justify-content: center; margin-bottom: 30px; flex-wrap: wrap; }
        .filter-btn { 
            background: rgba(255,255,255,0.1); 
            border: 1px solid rgba(255,255,255,0.2); 
            padding: 10px 24px; 
            border-radius: 40px; 
            cursor: pointer; 
            color: white;
            font-weight: 500;
            transition: all 0.3s;
        }
        .filter-btn:hover { background: rgba(255,255,255,0.2); transform: translateY(-2px); }
        .filter-btn.active { background: linear-gradient(135deg, #667eea, #764ba2); border-color: transparent; }
        
        .search { 
            display: block; 
            width: 320px; 
            margin: 0 auto 30px; 
            padding: 12px 20px; 
            border-radius: 40px; 
            border: 1px solid rgba(255,255,255,0.2); 
            background: rgba(0,0,0,0.3);
            color: white;
            text-align: center;
        }
        .search::placeholder { color: rgba(255,255,255,0.5); }
        .search:focus { outline: none; border-color: #667eea; }
        
        .apps-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px; }
        
        .app-card { 
            background: rgba(255,255,255,0.05); 
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px; 
            padding: 24px; 
            position: relative; 
            transition: all 0.3s;
        }
        .app-card:hover { transform: translateY(-4px); border-color: rgba(102,126,234,0.5); }
        
        .featured { 
            position: absolute; 
            top: -12px; 
            right: 20px; 
            background: linear-gradient(135deg, #f59e0b, #ef4444);
            color: white; 
            padding: 4px 16px; 
            border-radius: 30px; 
            font-size: 12px; 
            font-weight: 600;
        }
        
        .app-icon { font-size: 48px; margin-bottom: 16px; }
        .app-name { font-size: 18px; font-weight: 700; margin-bottom: 8px; color: white; }
        .app-desc { color: rgba(255,255,255,0.6); font-size: 14px; margin-bottom: 16px; line-height: 1.4; }
        .price { font-size: 24px; font-weight: 700; color: #a78bfa; margin-bottom: 16px; }
        .price small { font-size: 12px; color: rgba(255,255,255,0.5); }
        
        .btn-buy { 
            background: linear-gradient(135deg, #10b981, #059669); 
            color: white; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 40px; 
            cursor: pointer; 
            font-weight: 600; 
            flex: 1;
            transition: all 0.3s;
        }
        .btn-buy:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(16,185,129,0.3); }
        
        .modal { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.8); 
            backdrop-filter: blur(10px);
            justify-content: center; 
            align-items: center; 
            z-index: 1000; 
        }
        .modal-content { 
            background: linear-gradient(135deg, #1a1a2e, #0f0f23);
            border: 1px solid rgba(102,126,234,0.3);
            border-radius: 24px; 
            padding: 32px; 
            max-width: 400px; 
            width: 90%; 
        }
        .modal-content h3 { color: white; margin-bottom: 16px; }
        .modal-content p { color: rgba(255,255,255,0.7); margin-bottom: 20px; }
        .modal-content select { 
            width: 100%; 
            padding: 12px; 
            margin: 15px 0; 
            border-radius: 12px; 
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
        }
        
        .back-button-oval { 
            position: fixed; 
            bottom: 30px; 
            right: 30px; 
            background: rgba(102,126,234,0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(102,126,234,0.3);
            color: white; 
            padding: 12px 28px; 
            border-radius: 60px; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            cursor: pointer; 
            z-index: 100; 
            transition: all 0.3s;
        }
        .back-button-oval:hover { background: rgba(102,126,234,0.4); transform: scale(1.05); }
        
        .header-buttons { display: flex; gap: 15px; margin-bottom: 30px; justify-content: flex-end; }
        .btn-header { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); padding: 10px 20px; border-radius: 40px; color: white; cursor: pointer; transition: all 0.3s; }
        .btn-header:hover { background: rgba(255,255,255,0.2); transform: translateY(-2px); }
        
        /* AI виджет */
        .ai-floating-widget {
            position: fixed;
            bottom: 30px;
            left: 30px;
            z-index: 100;
        }
        .ai-widget-button {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(99,102,241,0.4);
            transition: all 0.3s;
        }
        .ai-widget-button:hover { transform: scale(1.05); }
        .ai-widget-badge {
            position: absolute;
            bottom: 5px;
            right: 5px;
            width: 12px;
            height: 12px;
            background: #10b981;
            border-radius: 50%;
            border: 2px solid #1a1a2e;
        }
        .ai-widget-tooltip {
            position: absolute;
            bottom: 70px;
            left: 0;
            background: rgba(0,0,0,0.8);
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 11px;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .ai-floating-widget:hover .ai-widget-tooltip { opacity: 1; }
        
        @media (max-width: 768px) {
            .apps-grid { grid-template-columns: 1fr; }
            .page-title { font-size: 28px; }
            .filters { gap: 8px; }
            .filter-btn { padding: 6px 16px; font-size: 12px; }
            .header-buttons { justify-content: center; }
            .download-bar { bottom: 100px; padding: 8px 16px; gap: 10px; }
            .download-bar button { padding: 6px 16px; font-size: 12px; }
        }
    </style>
</head>
<body>
<div class="animated-bg"></div>

<div class="container">
    <div class="header-buttons">
        <button class="btn-header" onclick="location.href='/my-apps'">
            <i class="bi bi-shopping-bag"></i> Мои приложения
        </button>
        <button class="btn-header" onclick="location.href='/dashboard-improved'">
            <i class="bi bi-speedometer2"></i> Главный дашборд
        </button>
    </div>

    <div class="page-header">
        <h1 class="page-title"><i class="bi bi-shop"></i> Маркетплейс BizStore</h1>
        <p class="page-subtitle">Выберите модули для скачивания или купите новые</p>
    </div>

    <div class="filters" id="filters">
        <button class="filter-btn active" data-cat="all">Все</button>
        <button class="filter-btn" data-cat="integration">🔌 Интеграции</button>
        <button class="filter-btn" data-cat="template">📄 Шаблоны</button>
        <button class="filter-btn" data-cat="ai_agent">🤖 AI-агенты</button>
        <button class="filter-btn" data-cat="service">🛠️ Услуги</button>
    </div>

    <input type="text" id="search" class="search" placeholder="Поиск приложений...">

    <div id="apps" class="apps-grid"></div>
</div>

<!-- Плавающая панель скачивания -->
<div class="download-bar" id="downloadBar" style="display: none;">
    <span>📱 Выбрано: <span class="count" id="selectedCount">0</span></span>
    <button id="downloadSelectedBtn">
        <i class="bi bi-download"></i> Скачать выбранное
    </button>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">Подтверждение покупки</h3>
        <p id="modalDesc"></p>
        <select id="period">
            <option value="monthly">Ежемесячно</option>
            <option value="yearly">Ежегодно (скидка 20%)</option>
        </select>
        <div id="modalPrice" style="font-size:24px; font-weight:bold; margin:15px 0;"></div>
        <button id="confirmBtn" class="btn-buy" style="width:100%;">Подтвердить</button>
        <button onclick="closeModal()" style="width:100%; margin-top:10px; padding:10px; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); border-radius:12px; cursor:pointer; color:white;">Отмена</button>
    </div>
</div>

<button class="back-button-oval" onclick="location.href='/dashboard-improved'">
    <i class="bi bi-arrow-left"></i> На главную
</button>

<div class="ai-floating-widget">
    <div class="ai-widget-button" onclick="openAIAssistant()">
        🤖
        <div class="ai-widget-badge">●</div>
    </div>
    <div class="ai-widget-tooltip">💬 Спросить AI ассистента</div>
</div>

<script>
    const apps = [
        { id: "1", name: "Ozon + Wildberries", desc: "Управление заказами, остатками, ценами на Ozon и Wildberries", cat: "integration", price: 6900, price_yearly: 69000, icon: "📦", featured: true },
        { id: "2", name: "Яндекс.Маркет", desc: "Интеграция с Яндекс.Маркет: управление ценами, остатками, заказами", cat: "integration", price: 2990, price_yearly: 29900, icon: "💙", featured: true },
        { id: "3", name: "1С:Бухгалтерия + ERP", desc: "Двусторонняя синхронизация с 1С:Бухгалтерия 3.0 и 1С:ERP", cat: "integration", price: 4900, price_yearly: 49000, icon: "🏦", featured: false },
        { id: "4", name: "HeadHunter Рекрутинг", desc: "Автоматический импорт резюме, публикация вакансий, аналитика рынка труда", cat: "integration", price: 5900, price_yearly: 59000, icon: "👥", featured: false },
        { id: "5", name: "Telegram Бизнес Пак", desc: "Корпоративный Telegram: рассылки, уведомления, чат-боты, аналитика", cat: "integration", price: 2900, price_yearly: 29000, icon: "📱", featured: false },
        { id: "6", name: "YandexGPT для бизнеса", desc: "AI-ассистенты, генерация контента, анализ документов на YandexGPT", cat: "ai_agent", price: 9900, price_yearly: 99000, icon: "🧠", featured: true },
        { id: "7", name: "Sales CRM Pro", desc: "Готовая CRM для отдела продаж: воронки, сделки, аналитика", cat: "template", price: 2900, price_yearly: 29000, icon: "📈", featured: false },
        { id: "8", name: "ЮKassa Платежи", desc: "Приём платежей через ЮKassa: все способы оплаты в одном решении", cat: "integration", price: 0, price_yearly: 0, icon: "💵", featured: false },
        { id: "9", name: "AI Копирайтер Pro", desc: "Генерация текстов, постов, статей с помощью нейросети", cat: "ai_agent", price: 2900, price_yearly: 29000, icon: "✍️", featured: false },
        { id: "10", name: "Виджет Поддержки", desc: "Чат-виджет для сайта с интеграцией в CRM", cat: "service", price: 1900, price_yearly: 19000, icon: "💬", featured: false },
        { id: "11", name: "Отчётность для ФНС", desc: "Автоматическое формирование и отправка отчётов в налоговую", cat: "service", price: 4900, price_yearly: 49000, icon: "📋", featured: false }
    ];

    let currentCat = 'all';
    let currentSearch = '';
    let selectedApp = null;
    
    // ========== ВЫБОР МОДУЛЕЙ ДЛЯ СКАЧИВАНИЯ ==========
    let selectedModules = JSON.parse(localStorage.getItem('selectedModules') || '[]');
    
    function updateSelectedUI() {
        const count = selectedModules.length;
        const downloadBar = document.getElementById('downloadBar');
        const countSpan = document.getElementById('selectedCount');
        
        if (countSpan) countSpan.innerText = count;
        if (downloadBar) {
            downloadBar.style.display = count > 0 ? 'flex' : 'none';
        }
    }
    
    function saveSelectedModules() {
        localStorage.setItem('selectedModules', JSON.stringify(selectedModules));
        updateSelectedUI();
    }
    
    // Обработчик выбора модуля (делегирование)
    document.addEventListener('change', function(e) {
        if (e.target.classList && e.target.classList.contains('module-checkbox')) {
            const id = e.target.dataset.id;
            const name = e.target.dataset.name;
            const price = e.target.dataset.price;
            
            if (e.target.checked) {
                if (!selectedModules.find(m => m.id === id)) {
                    selectedModules.push({ id, name, price });
                }
            } else {
                selectedModules = selectedModules.filter(m => m.id !== id);
            }
            saveSelectedModules();
        }
    });
    
    // Восстановление состояния чекбоксов после рендера
    function restoreCheckboxes() {
        document.querySelectorAll('.module-checkbox').forEach(cb => {
            const id = cb.dataset.id;
            if (selectedModules.find(m => m.id === id)) {
                cb.checked = true;
            }
        });
    }
    
    // Кнопка скачивания выбранных модулей
    document.getElementById('downloadSelectedBtn')?.addEventListener('click', function() {
        if (selectedModules.length === 0) {
            alert('❌ Выберите хотя бы один модуль для скачивания');
            return;
        }
        
        // Сохраняем выбранные модули и переходим на страницу с QR-кодом
        localStorage.setItem('modulesToDownload', JSON.stringify(selectedModules));
        window.location.href = '/marketplace-app?selected=' + encodeURIComponent(JSON.stringify(selectedModules));
    });

    function render() {
        let filtered = apps;
        if (currentCat !== 'all') filtered = filtered.filter(a => a.cat === currentCat);
        if (currentSearch) filtered = filtered.filter(a => a.name.toLowerCase().includes(currentSearch.toLowerCase()));
        
        const container = document.getElementById('apps');
        if (filtered.length === 0) {
            container.innerHTML = '<div style="text-align:center; color:rgba(255,255,255,0.6); padding:60px;">Нет приложений</div>';
            return;
        }
        
        container.innerHTML = filtered.map(app => `
            <div class="app-card">
                ${app.featured ? '<div class="featured">⭐ Рекомендуемое</div>' : ''}
                <div class="card-header-checkbox">
                    <input type="checkbox" class="module-checkbox" data-id="${app.id}" data-name="${app.name}" data-price="${app.price}">
                </div>
                <div class="app-icon">${app.icon}</div>
                <div class="app-name">${app.name}</div>
                <div class="app-desc">${app.desc}</div>
                <div class="price">${app.price === 0 ? 'Бесплатно' : app.price.toLocaleString() + ' ₽'}<small>/мес</small></div>
                <div class="card-actions">
                    <button class="btn-buy" onclick="showModal('${app.id}')">💳 Купить</button>
                </div>
            </div>
        `).join('');
        
        restoreCheckboxes();
    }

    function showModal(id) {
        selectedApp = apps.find(a => a.id === id);
        if (!selectedApp) return;
        document.getElementById('modalTitle').innerText = selectedApp.name;
        document.getElementById('modalDesc').innerText = selectedApp.desc;
        updatePrice();
        document.getElementById('modal').style.display = 'flex';
    }

    function updatePrice() {
        if (!selectedApp) return;
        const period = document.getElementById('period').value;
        const price = period === 'monthly' ? selectedApp.price : selectedApp.price_yearly;
        document.getElementById('modalPrice').innerHTML = `${price.toLocaleString()} ₽/${period === 'monthly' ? 'мес' : 'год'}`;
    }

    async function confirmPurchase() {
        if (!selectedApp) return;
        const period = document.getElementById('period').value;
        try {
            const res = await fetch('/marketplace/api/purchase', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ app_id: selectedApp.id, billing_period: period })
            });
            const data = await res.json();
            if (data.success) {
                alert(`✅ ${data.message}`);
                closeModal();
                window.location.href = '/my-apps';
            } else {
                alert('❌ Ошибка при покупке: ' + (data.error || 'Неизвестная ошибка'));
            }
        } catch(e) {
            console.error(e);
            alert('❌ Ошибка при покупке: ' + e.message);
        }
    }

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
        selectedApp = null;
    }

    document.getElementById('period').addEventListener('change', updatePrice);
    document.getElementById('confirmBtn').onclick = confirmPurchase;
    document.getElementById('search').addEventListener('input', e => { currentSearch = e.target.value; render(); });
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentCat = btn.dataset.cat;
            render();
        });
    });

    function openAIAssistant() {
        window.open('/ai-assistant', '_blank', 'width=500,height=700,left=' + (screen.width - 520) + ',top=100');
    }
    
    updateSelectedUI();
    render();
</script>
</body>
</html>
